# ============================================
# Docker Compose for Skin Disease AI System
# ============================================

version: '3.8'

services:
  api:
    build: .
    container_name: skin-disease-api
    ports:
      - "8000:8000"
    volumes:
      - ./models/weights:/app/models/weights
      - ./logs:/app/logs
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: .
    container_name: skin-disease-frontend
    ports:
      - "7860:7860"
    volumes:
      - ./frontend:/app/frontend
    environment:
      - API_URL=http://api:8000
    command: ["python", "frontend/app.py"]
    depends_on:
      - api
    restart: unless-stopped

