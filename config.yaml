# ============================================
# Skin Disease Detection & LLM Advisor System
# Configuration File (Fedora Linux)
# ============================================

# Project Settings
project:
  name: "Skin Disease AI System"
  version: "1.0.0"
  description: "AI-powered skin disease detection with LLM recommendations"
  os: "Fedora Linux"

# Paths (Fedora home directory structure)
paths:
  base_dir: "/home/${USER}/Projects/skin-disease-ai-system"
  raw_ "data/raw"
  processed_ "data/processed"
  model_weights: "models/weights"
  checkpoints: "models/checkpoints"
  logs: "logs"
  notebooks: "notebooks"

# Model Configuration
model:
  name: "efficientnet_b0"  # Options: resnet50, efficientnet_b0, mobilenet_v2, yolov8
  pretrained: true
  num_classes: 6  # Update based on dataset
  image_size: 224
  batch_size: 32
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001
  dropout: 0.3
  device: "cuda"  # Change to "cpu" if no GPU available

# Training Settings
training:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  early_stopping_patience: 5
  reduce_lr_patience: 3
  seed: 42
  num_workers: 4  # Adjust based on CPU cores

# API Settings
api:
  host: "0.0.0.0"
  port: 8000
  reload: true
  workers: 1
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:7860"
    - "http://127.0.0.1:7860"
    - "http://localhost:8501"

# LLM Configuration
llm:
  provider: "gemini"  # Options: gemini, openai, qwen, huggingface
  model_name: "gemini-1.5-flash"
  temperature: 0.7
  max_tokens: 500
  timeout: 30
  api_key_env: "GEMINI_API_KEY"

# Inference Settings
inference:
  confidence_threshold: 0.5
  max_image_size_mb: 10
  allowed_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"

# Logging (Fedora standard)
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/app.log"
  max_size_mb: 10
  backup_count: 5

# Fedora System Settings
system:
  python_version: "3.11"
  venv_path: "venv"
  package_manager: "dnf"
